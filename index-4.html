const SUPABASE_URL = "https://jomsobeswegtpvpdkbhc.supabase.co";

const api = async (method, path, body, extra={}) => {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": method==="POST" ? "return=representation" : "return=minimal",
        ...extra
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if(method==="DELETE"||method==="PATCH") return true;
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error(e);
    return null;
  }
};

const dbInsert = (table, body)  => api("POST",   table, body);

// ─── FECHA ───────────────────────────────────────────────────
const DAYS_SHORT  = ["L","M","X","J","V","S","D"];
const DAYS_FULL   = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const MONTHS      = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const MONTHS_FULL = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const COLORS      = ["#e84393","#00c896","#ffa500","#7c6cff","#00aeef","#ff5252","#64dd17"];

const buildDays = () => {
  const arr = []; const base = new Date(); base.setHours(0,0,0,0);
  for(let i=-7; i<=13; i++){
    const d = new Date(base); d.setDate(base.getDate()+i); arr.push(d);
  }
  return arr;
};
const ALL_DAYS  = buildDays();
const TODAY_IDX = 7;

const dateKey  = d => { const dd=new Date(d); dd.setHours(12,0,0,0); return dd.toISOString().slice(0,10); };
const todayKey = ()  => dateKey(new Date());
const dayName  = d => DAYS_SHORT[(d.getDay()+6)%7];
const dayNum   = d => d.getDate();
const monthStr = d => MONTHS[d.getMonth()];
const fullDate = d => `${DAYS_FULL[(d.getDay()+6)%7]}, ${d.getDate()} de ${MONTHS_FULL[d.getMonth()]}`;
const isPast   = d => dateKey(d) < todayKey();
const isToday  = d => dateKey(d) === todayKey();

const SLOTS   = ["08:00","09:30","11:00","12:30","14:00","15:30","17:00","18:30","20:00","21:30"];
const slotEnd = s => {
  const [h,m]=s.split(":").map(Number);
  const e=new Date(0,0,0,h,m+90);
  return `${String(e.getHours()).padStart(2,"0")}:${String(e.getMinutes()).padStart(2,"0")}`;
};
const initials = name => name.trim().split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

const getDeviceId = () => {
  let id = localStorage.getItem("pbm_device_id");
  if(!id){ id=Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem("pbm_device_id",id); }
  return id;
};

const Av = ({player,size=32,style={}}) => player ? (
  <div style={{width:size,height:size,borderRadius:"50%",background:player.color||"#444",
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*0.33,fontWeight:700,color:"#fff",flexShrink:0,...style}}>
    {player.avatar||initials(player.name||"?")}
  </div>
) : (
  <div style={{width:size,height:size,borderRadius:"50%",
    background:"rgba(255,255,255,.07)",border:"1.5px dashed rgba(255,255,255,.2)",
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:size*0.4,color:"rgba(255,255,255,.3)",flexShrink:0,...style}}>+</div>
);

function Sheet({children,onClose}){
  return(
    <div style={{position:"absolute",inset:0,zIndex:100,background:"rgba(0,0,0,.75)",
      backdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"#0f1c2e",borderRadius:"24px 24px 0 0",
          width:"100%",padding:"20px 22px 44px",animation:"sheetUp .25s ease",
          maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:36,height:4,background:"rgba(255,255,255,.15)",borderRadius:2,margin:"0 auto 20px"}}/>
        {children}
      </div>
    </div>
  );
}

function Spinner(){
  return <div style={{width:18,height:18,border:"2px solid rgba(255,255,255,.15)",
    borderTop:"2px solid #2d7dd2",borderRadius:"50%",animation:"spin .7s linear infinite",
    margin:"0 auto"}}/>;
}

function App(){
  const [deviceId]  = useState(getDeviceId);
  const [myName,setMyName]       = useState(()=>localStorage.getItem("pbm_name")||"");
  const [myColor,setMyColor]     = useState(()=>localStorage.getItem("pbm_color")||COLORS[0]);
  const [nameInput,setNameInput] = useState(()=>localStorage.getItem("pbm_name")||"");
  const [nameSet,setNameSet]     = useState(()=>!!localStorage.getItem("pbm_name"));

  const [bookings,setBookings]   = useState([]);
  const [bookedToday,setBookedToday] = useState(false);
  const [loading,setLoading]     = useState(true);
  const [dayIdx,setDayIdx]       = useState(TODAY_IDX);
  const [modal,setModal]         = useState(null);
  const [selSlot,setSelSlot]     = useState(null);
  const [createType,setCreateType] = useState("open");
  const [createNote,setCreateNote] = useState("");
  const [toast,setToast]         = useState(null);
  const [tab,setTab]             = useState("schedule");
  const toastTimer  = useRef(null);
  const dayScrollRef = useRef(null);
  const pollTimer   = useRef(null);

  const selectedDate = ALL_DAYS[dayIdx];
  const selKey       = dateKey(selectedDate);
  const dayIsPast    = isPast(selectedDate);
  const me = {name:myName, avatar:initials(myName||"?"), color:myColor, deviceId};

  const showToast=(msg,kind="ok")=>{
    clearTimeout(toastTimer.current);
    setToast({msg,kind});
    toastTimer.current=setTimeout(()=>setToast(null),2800);
  };

  // ── Load bookings for selected day ──
  const loadBookings = useCallback(async () => {
    const data = await dbGet("bookings", `day_key=eq.${selKey}&order=slot.asc`);
    if(data) setBookings(data);
    setLoading(false);
  }, [selKey]);

  // ── Check device limit for today ──
  const checkLimit = useCallback(async () => {
    const data = await dbGet("device_limits",
      `device_id=eq.${deviceId}&booking_date=eq.${todayKey()}`);
    setBookedToday(!!(data&&data.length>0));
  }, [deviceId]);

  useEffect(()=>{
    setLoading(true);
    loadBookings();
    checkLimit();
    clearInterval(pollTimer.current);
    pollTimer.current = setInterval(()=>{ loadBookings(); checkLimit(); }, 15000);
    return ()=>clearInterval(pollTimer.current);
  }, [loadBookings, checkLimit]);

  useEffect(()=>{
    if(dayScrollRef.current){
      const btns = dayScrollRef.current.querySelectorAll("button");
      if(btns[TODAY_IDX]) btns[TODAY_IDX].scrollIntoView({inline:"center",behavior:"smooth"});
    }
  },[]);

  const confirmName=()=>{
    if(!nameInput.trim()) return;
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    setMyName(nameInput.trim()); setMyColor(color); setNameSet(true);
    localStorage.setItem("pbm_name",nameInput.trim());
    localStorage.setItem("pbm_color",color);
  };

  const bkForSlot = slot => bookings.find(b=>b.slot===slot);

  const status = slot => {
    const b=bkForSlot(slot); if(!b) return "free";
    if(b.type==="full") return "full";
    return (b.players||[]).filter(Boolean).length===4?"complete":"open";
  };

  const openCount = bookings.filter(b=>b.type==="open"&&(b.players||[]).some(p=>!p)).length;

  // ── CREATE ──
  const doCreate = async () => {
    if(!nameSet){showToast("Primero pon tu nombre","err");return;}
    if(bookedToday&&isToday(selectedDate)){showToast("Solo 1 reserva por día","err");return;}
    if(bkForSlot(selSlot)){showToast("Slot ocupado","err");return;}
    const body = {
      slot:selSlot, day_key:selKey, type:createType,
      owner_name:myName, owner_avatar:initials(myName),
      owner_color:myColor, owner_device:deviceId,
      players:[{name:myName,avatar:initials(myName),color:myColor,deviceId},null,null,null],
      note:createNote
    };
    const res = await dbInsert("bookings", body);
    if(res){
      if(isToday(selectedDate)){
        await dbInsert("device_limits",{device_id:deviceId, booking_date:todayKey()});
        setBookedToday(true);
      }
      setModal(null); setCreateNote("");
      showToast(createType==="full"?"✅ Pista reservada":"✅ Partido abierto creado");
      loadBookings();
    } else { showToast("Error al reservar","err"); }
  };

  // ── JOIN ──
  const doJoin = async (slotOverride) => {
    if(!nameSet){showToast("Primero pon tu nombre","err");return;}
    const s=slotOverride||selSlot;
    const b=bookings.find(b=>b.slot===s);
    if(!b||b.type!=="open") return;
    if((b.players||[]).some(p=>p&&p.deviceId===deviceId)){showToast("Ya estás apuntado","err");return;}
    if(bookedToday&&isToday(selectedDate)){showToast("Solo 1 reserva por día","err");return;}
    const idx=(b.players||[]).findIndex(p=>!p);
    if(idx===-1){showToast("Partido completo","err");return;}
    const np=[...(b.players||[])];
    np[idx]={name:myName,avatar:initials(myName),color:myColor,deviceId};
    const ok = await dbUpdate("bookings",`id=eq.${b.id}`,{players:np});
    if(ok){
      if(isToday(selectedDate)){
        await dbInsert("device_limits",{device_id:deviceId, booking_date:todayKey()});
        setBookedToday(true);
      }
      setModal(null); showToast("✅ ¡Apuntado!");
      loadBookings();
    } else { showToast("Error al apuntarse","err"); }
  };

  // ── LEAVE ──
  const doLeave = async () => {
    const b=bkForSlot(selSlot); if(!b) return;
    if(b.owner_device===deviceId){
      await dbDelete("bookings",`id=eq.${b.id}`);
      if(isToday(selectedDate)){
        await dbDelete("device_limits",`device_id=eq.${deviceId}&booking_date=eq.${todayKey()}`);
        setBookedToday(false);
      }
      showToast("Reserva cancelada","info");
    } else {
      const np=(b.players||[]).map(p=>p&&p.deviceId===deviceId?null:p);
      await dbUpdate("bookings",`id=eq.${b.id}`,{players:np});
      if(isToday(selectedDate)){
        await dbDelete("device_limits",`device_id=eq.${deviceId}&booking_date=eq.${todayKey()}`);
        setBookedToday(false);
      }
      showToast("Te has salido","info");
    }
    setModal(null); loadBookings();
  };

  // ── Past bookings for history (load all past) ──
  const [pastBookings,setPastBookings] = useState([]);
  useEffect(()=>{
    if(tab==="history"){
      dbGet("bookings",`day_key=lt.${todayKey()}&order=day_key.desc,slot.asc&limit=100`)
        .then(d=>{ if(d) setPastBookings(d); });
    }
  },[tab]);

  const myUpcoming = bookings.filter(b=>
    b.day_key>=todayKey()&&
    (b.owner_device===deviceId||(b.players||[]).some(p=>p&&p.deviceId===deviceId))
  );

  const SC={
    free:    {bg:"rgba(255,255,255,.025)",bd:"rgba(255,255,255,.07)",acc:"rgba(255,255,255,.18)"},
    full:    {bg:"rgba(255,60,80,.08)",   bd:"rgba(255,60,80,.2)",   acc:"#ff3c50"},
    open:    {bg:"rgba(0,200,150,.07)",   bd:"rgba(0,200,150,.22)",  acc:"#00e5aa"},
    complete:{bg:"rgba(255,160,0,.06)",   bd:"rgba(255,160,0,.2)",   acc:"#ffa500"},
  };

  return(
    <div style={{height:"100vh",background:"#080d18",fontFamily:"'DM Sans',sans-serif",
      color:"#eef2ff",display:"flex",flexDirection:"column",maxWidth:430,margin:"0 auto",
      position:"relative",overflow:"hidden"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{display:none;}
        input{outline:none;font-family:'DM Sans',sans-serif;}
        button{font-family:'DM Sans',sans-serif;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes sheetUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
        @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,0)}50%{box-shadow:0 0 14px 2px rgba(0,200,150,.22)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .tap{transition:transform .13s,opacity .13s;}
        .tap:active{transform:scale(.93);opacity:.8;}
        .inp{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
          border-radius:14px;padding:13px 16px;color:#eef2ff;font-size:15px;width:100%;}
        .inp:focus{border-color:rgba(45,125,210,.6);}
        .inp::placeholder{color:rgba(255,255,255,.25);}
        .scroll{overflow-y:auto;}
        .hscroll{overflow-x:auto;display:flex;gap:5px;padding-bottom:2px;}
        .hscroll::-webkit-scrollbar{display:none;}
      `}</style>

      <div style={{position:"absolute",inset:0,pointerEvents:"none",
        background:"radial-gradient(ellipse 70% 40% at 50% 0%,rgba(29,78,140,.25) 0%,transparent 70%)"}}/>

      {/* ── NAME SCREEN ── */}
      {!nameSet&&(
        <div style={{position:"absolute",inset:0,zIndex:200,background:"#080d18",
          display:"flex",flexDirection:"column",justifyContent:"center",
          padding:"40px 28px",animation:"fadeUp .4s ease"}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <img src={LOGO} alt="logo" style={{width:120,height:120,borderRadius:"50%",marginBottom:16}}/>
            <div style={{fontWeight:800,fontSize:22,color:"#fff",letterSpacing:-.5}}>Club de Pádel Belmontejo</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.35)",marginTop:6}}>¿Cómo te llamas?</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.2)",marginTop:8,lineHeight:1.6}}>
              Tu nombre aparece en el cuadro para que los demás te vean.<br/>
              No guardamos ningún dato personal.
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input className="inp" placeholder="Tu nombre (ej: Juan García)" autoFocus
              value={nameInput} onChange={e=>setNameInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&confirmName()}/>
            <button className="tap" onClick={confirmName}
              style={{background:"linear-gradient(135deg,#1d4e8c,#2d7dd2)",borderRadius:14,
                padding:"15px",color:"#fff",fontWeight:700,fontSize:15,border:"none",cursor:"pointer"}}>
              Entrar a la pista
            </button>
            <div style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,.2)"}}>
              Solo se te preguntará una vez en este dispositivo
            </div>
          </div>
        </div>
      )}

      {/* ── HEADER ── */}
      <div style={{flexShrink:0,background:"rgba(8,13,24,.96)",backdropFilter:"blur(20px)",
        borderBottom:"1px solid rgba(255,255,255,.05)",padding:"10px 16px 8px",zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src={LOGO} alt="logo" style={{width:36,height:36,borderRadius:"50%"}}/>
            <div>
              <div style={{fontWeight:800,fontSize:15,color:"#fff",letterSpacing:-.3}}>Club de Pádel</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.4)",fontFamily:"DM Mono"}}>Belmontejo · 1h 30min</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {bookedToday&&(
              <div style={{fontSize:10,fontWeight:600,color:"#ffa500",
                background:"rgba(255,160,0,.12)",border:"1px solid rgba(255,160,0,.25)",
                borderRadius:8,padding:"3px 9px"}}>1 reserva hoy</div>
            )}
            <Av player={me} size={34}/>
          </div>
        </div>
        <div className="hscroll" ref={dayScrollRef}>

                  background:sel?"linear-gradient(135deg,#1d4e8c,#2d7dd2)":
                    today?"rgba(29,78,140,.25)":"rgba(255,255,255,.04)",
                  color:sel?"#fff":past?"rgba(255,255,255,.22)":"rgba(255,255,255,.6)",

                  display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                <span style={{fontSize:9}}>{dayName(d)}</span>
                <span style={{fontSize:13,fontWeight:800}}>{dayNum(d)}</span>
                <span style={{fontSize:8,opacity:.8}}>{monthStr(d)}</span>
              </button>
            );
          })}
        </div>

              {dayIsPast&&<span style={{fontSize:9,color:"#ffa500",background:"rgba(255,160,0,.1)",

            {!dayIsPast&&bookedToday&&isToday(selectedDate)&&(
              <div style={{background:"rgba(255,160,0,.08)",border:"1px solid rgba(255,160,0,.2)",

                Ya tienes una partida hoy — solo 1 reserva por día.
              </div>

            {loading?(
              <div style={{padding:"40px 0",textAlign:"center"}}><Spinner/></div>
            ):SLOTS.map(slot=>{
              const b=bkForSlot(slot); const st=status(slot);
              const filled=b?(b.players||[]).filter(Boolean).length:0;
              const isMine=b&&(b.owner_device===deviceId||(b.players||[]).some(p=>p&&p.deviceId===deviceId));
              const c=dayIsPast?{bg:"rgba(255,255,255,.01)",bd:"rgba(255,255,255,.05)",acc:"rgba(255,255,255,.08)"}:(SC[st]||SC.free);
              const blocked=!dayIsPast&&bookedToday&&isToday(selectedDate)&&!b;
              return(
                <div key={slot} className="tap"
                  onClick={()=>{ if(dayIsPast&&!b) return; setSelSlot(slot); setModal(b?"detail":"pick"); }}
                  style={{background:blocked?"rgba(255,255,255,.01)":c.bg,
                    border:`1px solid ${blocked?"rgba(255,255,255,.04)":c.bd}`,
                    borderLeft:`3px solid ${blocked?"rgba(255,255,255,.05)":c.acc}`,
                    borderRadius:13,padding:"11px 14px",display:"flex",alignItems:"center",gap:12,
                    animation:st==="open"&&!blocked&&!dayIsPast?"glow 3s ease-in-out infinite":"none",
                    cursor:dayIsPast&&!b?"default":"pointer",
                    opacity:blocked?0.3:dayIsPast&&!b?0.35:1}}>
                  <div style={{minWidth:44,textAlign:"center"}}>
                    <div style={{fontSize:12,fontWeight:700,fontFamily:"DM Mono",
                      color:dayIsPast?"rgba(255,255,255,.3)":"#fff"}}>{slot}</div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:1}}>{slotEnd(slot)}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    {!b&&<span style={{fontSize:12,color:"rgba(255,255,255,.25)"}}>
                      {dayIsPast?"Sin partido":blocked?"No disponible":"Disponible"}
                    </span>}
                    {b?.type==="full"&&<>
                      <div style={{fontSize:12,fontWeight:600,color:dayIsPast?"rgba(255,255,255,.45)":"#fff"}}>Reserva privada</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:1}}>por {b.owner_name}</div>
                    </>}
                    {b?.type==="open"&&<>
                      <div style={{fontSize:12,fontWeight:600,color:dayIsPast?"rgba(255,255,255,.45)":"#fff"}}>
                        {dayIsPast?"Partido jugado":"Partido abierto"} · {filled}/4
                      </div>
                      {b.note&&<div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:1,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.note}</div>}
                    </>}
                  </div>
                  <div style={{display:"flex",flexShrink:0}}>
                    {b?(b.players||[]).map((p,i)=>(
                      <Av key={i} player={p} size={22}
                        style={{marginLeft:i>0?-6:0,border:"2px solid #080d18",opacity:dayIsPast?.55:1}}/>
                    )):<span style={{fontSize:15,color:"rgba(255,255,255,.1)"}}>+</span>}
                  </div>
                  {isMine&&<span style={{fontSize:8,fontWeight:700,color:"#2d7dd2",
                    background:"rgba(45,125,210,.15)",borderRadius:5,padding:"2px 6px",flexShrink:0}}>TÚ</span>}
                </div>
              );
            })}
          </div>
        )}

        {/* ABIERTOS */}
        {tab==="open"&&(
          <div style={{animation:"fadeUp .3s ease"}}>
            <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.3)",
              textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>
              Partidos abiertos · {fullDate(selectedDate)}
            </div>
            {loading?<div style={{padding:"40px 0",textAlign:"center"}}><Spinner/></div>:
            bookings.filter(b=>b.type==="open"&&(b.players||[]).some(p=>!p)).length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.25)"}}>
                <img src={LOGO} style={{width:56,height:56,borderRadius:"50%",opacity:.2,marginBottom:12}}/>
                <div style={{fontSize:13,fontWeight:500}}>No hay partidos abiertos</div>
                <div style={{fontSize:11,marginTop:5}}>Crea uno desde la pestaña Horario</div>
              </div>
            ):bookings.filter(b=>b.type==="open"&&(b.players||[]).some(p=>!p)).map(b=>{
              const filled=(b.players||[]).filter(Boolean).length;
              const isIn=(b.players||[]).some(p=>p&&p.deviceId===deviceId);
              const canJoin=!isIn&&filled<4&&!(bookedToday&&isToday(selectedDate));
              return(
                <div key={b.id} style={{background:"rgba(29,78,140,.1)",
                  border:"1px solid rgba(45,125,210,.25)",borderRadius:15,padding:"15px",marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontFamily:"DM Mono",fontSize:15,fontWeight:500,color:"#2d7dd2"}}>
                        {b.slot} – {slotEnd(b.slot)}
                      </div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginTop:2}}>Organiza: {b.owner_name}</div>
                      {b.note&&<div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginTop:3,fontStyle:"italic"}}>{b.note}</div>}
                    </div>
                    <div style={{textAlign:"center",background:"rgba(45,125,210,.15)",borderRadius:10,padding:"7px 12px"}}>
                      <div style={{fontSize:20,fontWeight:800,color:"#2d7dd2"}}>{filled}/4</div>
                      <div style={{fontSize:9,color:"rgba(255,255,255,.4)"}}>jugadores</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:10}}>
                    {(b.players||[]).map((p,i)=>(
                      <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                        <Av player={p} size={36}/>
                        <div style={{fontSize:8,color:"rgba(255,255,255,.35)",maxWidth:36,
                          textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {p?p.name.split(" ")[0]:"Libre"}
                        </div>
                      </div>
                    ))}
                  </div>
                  {canJoin?(
                    <button className="tap" onClick={()=>doJoin(b.slot)}
                      style={{width:"100%",background:"linear-gradient(135deg,#1d4e8c,#2d7dd2)",
                        borderRadius:11,padding:"10px",color:"#fff",fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>
                      Apuntarme
                    </button>
                  ):(
                    <div style={{textAlign:"center",fontSize:11,fontWeight:600,
                      color:isIn?"#2d7dd2":"#ffa500"}}>
                      {isIn?"✓ Ya estás apuntado":bookedToday&&isToday(selectedDate)?"Ya tienes partida hoy":"Partido completo"}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* HISTORIAL */}
        {tab==="history"&&(
          <div style={{animation:"fadeUp .3s ease"}}>
            <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.3)",
              textTransform:"uppercase",letterSpacing:.8,marginBottom:12}}>
              Partidos anteriores
            </div>
            {pastBookings.length===0?(
              <div style={{textAlign:"center",padding:"50px 0",color:"rgba(255,255,255,.25)"}}>
                <div style={{fontSize:32,marginBottom:8}}>🕐</div>
                <div style={{fontSize:13}}>Sin historial todavía</div>
              </div>
            ):(
              Object.entries(
                pastBookings.reduce((acc,b)=>{
                  if(!acc[b.day_key]) acc[b.day_key]=[];
                  acc[b.day_key].push(b); return acc;
                },{})
              ).map(([dk,bks])=>{
                const d=new Date(dk+"T12:00:00");
                return(
                  <div key={dk} style={{marginBottom:16}}>
                    <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,.35)",
                      marginBottom:7,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{textTransform:"capitalize"}}>{fullDate(d)}</span>
                      <div style={{flex:1,height:1,background:"rgba(255,255,255,.07)"}}/>
                    </div>
                    {bks.map(b=>{
                      const filled=(b.players||[]).filter(Boolean).length;
                      const isMine=b.owner_device===deviceId||(b.players||[]).some(p=>p&&p.deviceId===deviceId);
                      return(
                        <div key={b.id} style={{background:"rgba(255,255,255,.03)",
                          border:"1px solid rgba(255,255,255,.06)",borderRadius:12,
                          padding:"12px",marginBottom:7,display:"flex",alignItems:"center",gap:12,opacity:.75}}>
                          <div style={{background:"rgba(255,255,255,.06)",borderRadius:9,padding:"8px",
                            fontFamily:"DM Mono",fontSize:12,color:"rgba(255,255,255,.4)",minWidth:46,textAlign:"center"}}>
                            {b.slot}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:12,color:"rgba(255,255,255,.6)"}}>
                              {b.type==="full"?"Reserva privada":`Partido · ${filled}/4`}
                            </div>
                            <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:2}}>por {b.owner_name}</div>
                          </div>
                          <div style={{display:"flex"}}>
                            {(b.players||[]).map((p,i)=>(
                              <Av key={i} player={p} size={20}

                          </div>

                  </div>

              })

          </div>

        {/* PERFIL */}
        {tab==="profile"&&(
          <div style={{animation:"fadeUp .3s ease"}}>

              borderRadius:18,padding:"18px",marginBottom:18}}>
              <Av player={me} size={52}/>

                <div style={{fontWeight:800,fontSize:17,color:"#fff"}}>{myName||"Sin nombre"}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:2}}>Este dispositivo</div>
                <div style={{fontSize:11,color:"#2d7dd2",marginTop:3,fontWeight:600}}>

                <input className="inp" style={{flex:1,padding:"10px 14px",fontSize:13}}

                <button className="tap" onClick={confirmName}
                  style={{background:"linear-gradient(135deg,#1d4e8c,#2d7dd2)",border:"none",

                  OK

              </div>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.3)",

              <div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,.25)"}}>
                <div style={{fontSize:30,marginBottom:7}}>📭</div>

              </div>
            ):myUpcoming.map(b=>(
              <div key={b.id} style={{background:"rgba(255,255,255,.04)",

                padding:"13px",marginBottom:7,display:"flex",alignItems:"center",gap:11}}>
                <div style={{background:"rgba(29,78,140,.3)",borderRadius:9,padding:"8px",
                  fontFamily:"DM Mono",fontSize:12,fontWeight:500,color:"#2d7dd2",minWidth:46,textAlign:"center"}}>
                  {b.slot}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:12,color:"#fff",textTransform:"capitalize"}}>
                    {fullDate(new Date(b.day_key+"T12:00:00"))}
                  </div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:2}}>
                    {b.type==="full"?"Reserva privada":"Partido abierto"} · {(b.players||[]).filter(Boolean).length}/4
                  </div>
                </div>
                <div style={{display:"flex"}}>
                  {(b.players||[]).map((p,i)=>(
                    <Av key={i} player={p} size={20} style={{marginLeft:i>0?-5:0,border:"2px solid #080d18"}}/>
                  ))}
                </div>
              </div>
            ))}
            <div style={{marginTop:20,background:"rgba(29,78,140,.06)",
              border:"1px solid rgba(45,125,210,.12)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:10,color:"rgba(45,125,210,.8)",fontWeight:600,marginBottom:4}}>Privacidad</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.3)",lineHeight:1.6}}>
                Solo guardamos un ID anónimo de este dispositivo para limitar a 1 reserva por día.
                No almacenamos nombre, email ni ningún dato personal en ninguna base de datos.
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div style={{flexShrink:0,background:"rgba(8,13,24,.97)",backdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,.06)",padding:"6px 0 14px",
        display:"flex",justifyContent:"space-around",zIndex:10}}>
        {[["schedule","📅","Horario"],["open","🎯","Abiertos"],["history","🕐","Historial"],["profile","👤","Yo"]].map(([t,ic,lb])=>(
          <button key={t} className="tap" onClick={()=>setTab(t)}
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,
              background:"transparent",padding:"4px 14px",border:"none",cursor:"pointer",
              color:tab===t?"#2d7dd2":"rgba(255,255,255,.3)",position:"relative"}}>
            <span style={{fontSize:18}}>{ic}</span>
            <span style={{fontSize:9,fontWeight:600}}>{lb}</span>
            {t==="open"&&openCount>0&&(
              <span style={{position:"absolute",top:0,right:6,background:"#2d7dd2",color:"#fff",
                borderRadius:7,padding:"1px 5px",fontSize:8,fontWeight:800}}>{openCount}</span>
            )}
          </button>
        ))}
      </div>

      {/* MODAL PICK */}
      {modal==="pick"&&(
        <Sheet onClose={()=>setModal(null)}>
          <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginBottom:4,
            fontFamily:"DM Mono",textTransform:"uppercase"}}>
            {fullDate(selectedDate)} · {selSlot}–{slotEnd(selSlot||"08:00")}
          </div>
          {bookedToday&&isToday(selectedDate)?(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:36,marginBottom:12}}>🚫</div>
              <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:8}}>Ya tienes partida hoy</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.4)",lineHeight:1.5}}>
                Solo se permite una reserva por día desde este dispositivo.
              </div>
            </div>
          ):(
            <>
              <div style={{fontSize:19,fontWeight:800,color:"#fff",marginBottom:18}}>¿Cómo quieres reservar?</div>
              {[
                {t:"open",icon:"🎯",title:"Partido abierto",sub:"Otros jugadores pueden apuntarse solos",grad:"linear-gradient(135deg,#1d4e8c,#2d7dd2)"},
                {t:"full",icon:"🏟️",title:"Pista privada",sub:"Tú gestionas quién juega",grad:"linear-gradient(135deg,#c0002a,#ff3c50)"},
              ].map(opt=>(
                <button key={opt.t} className="tap" onClick={()=>setCreateType(opt.t)}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:12,
                    background:createType===opt.t?opt.grad:"rgba(255,255,255,.04)",
                    border:createType===opt.t?"none":"1.5px solid rgba(255,255,255,.09)",
                    borderRadius:15,padding:"14px 16px",marginBottom:9,textAlign:"left",cursor:"pointer"}}>
                  <span style={{fontSize:24}}>{opt.icon}</span>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#fff"}}>{opt.title}</div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:1}}>{opt.sub}</div>
                  </div>
                </button>
              ))}
              {createType==="open"&&(
                <input className="inp" placeholder="Nota para otros jugadores (opcional)"
                  value={createNote} onChange={e=>setCreateNote(e.target.value)}
                  style={{marginBottom:12,marginTop:2}}/>
              )}
              <button className="tap" onClick={doCreate}
                style={{width:"100%",background:"linear-gradient(135deg,#1d4e8c,#2d7dd2)",
                  borderRadius:13,padding:"14px",color:"#fff",fontWeight:700,fontSize:14,
                  marginTop:2,border:"none",cursor:"pointer"}}>
                Confirmar reserva
              </button>
            </>
          )}
        </Sheet>
      )}

      {/* MODAL DETAIL */}
      {modal==="detail"&&selSlot&&(()=>{
        const b=bkForSlot(selSlot); if(!b) return null;
        const filled=(b.players||[]).filter(Boolean).length;
        const isIn=b.owner_device===deviceId||(b.players||[]).some(p=>p&&p.deviceId===deviceId);
        const canJoin=b.type==="open"&&!isIn&&filled<4&&!(bookedToday&&isToday(selectedDate))&&!dayIsPast;
        return(
          <Sheet onClose={()=>setModal(null)}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}>
              <span style={{fontSize:22}}>{b.type==="full"?"🏟️":"🎯"}</span>
              <div>
                <div style={{fontWeight:800,fontSize:17,color:"#fff"}}>
                  {b.type==="full"?"Pista reservada":dayIsPast?"Partido jugado":"Partido abierto"}
                </div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.35)",fontFamily:"DM Mono",marginTop:1}}>
                  {fullDate(selectedDate)} · {selSlot}–{slotEnd(selSlot)}
                </div>
              </div>
            </div>
            {b.note&&(
              <div style={{background:"rgba(29,78,140,.1)",border:"1px solid rgba(45,125,210,.2)",
                borderRadius:11,padding:"9px 13px",fontSize:12,color:"rgba(255,255,255,.7)",
                fontStyle:"italic",marginBottom:12}}>{b.note}</div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:16}}>
              {(b.players||[]).map((p,i)=>(
                <div key={i} style={{
                  background:p?"rgba(255,255,255,.04)":"rgba(255,255,255,.02)",
                  border:p?"1px solid rgba(255,255,255,.1)":"1px dashed rgba(255,255,255,.08)",
                  borderRadius:13,padding:"11px",display:"flex",alignItems:"center",gap:9}}>
                  <Av player={p} size={33}/>
                  <div>
                    <div style={{fontSize:11,fontWeight:p?600:400,color:p?"#fff":"rgba(255,255,255,.25)"}}>
                      {p?p.name:"Libre"}
                    </div>
                    {i===0&&<div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>Organizador</div>}
                    {p&&p.deviceId===deviceId&&<div style={{fontSize:9,color:"#2d7dd2"}}>Tú</div>}
                  </div>
                </div>
              ))}
            </div>
            {canJoin&&(
              <button className="tap" onClick={()=>doJoin()}
                style={{width:"100%",background:"linear-gradient(135deg,#1d4e8c,#2d7dd2)",
                  borderRadius:13,padding:"14px",color:"#fff",fontWeight:700,fontSize:14,
                  marginBottom:9,border:"none",cursor:"pointer"}}>
                ¡Apuntarme al partido!
              </button>
            )}
            {!canJoin&&!isIn&&(bookedToday&&isToday(selectedDate))&&filled<4&&!dayIsPast&&(
              <div style={{textAlign:"center",background:"rgba(255,160,0,.08)",
                border:"1px solid rgba(255,160,0,.2)",borderRadius:11,padding:"12px",
                fontSize:12,color:"#ffa500",marginBottom:9}}>
                Ya tienes una partida reservada hoy
              </div>
            )}
            {!canJoin&&filled===4&&!isIn&&(
              <div style={{textAlign:"center",background:"rgba(255,160,0,.08)",
                border:"1px solid rgba(255,160,0,.2)",borderRadius:11,padding:"12px",
                fontSize:12,color:"#ffa500",marginBottom:9}}>
                Partido completo — 4/4 jugadores
              </div>
            )}
            {isIn&&!dayIsPast&&(
              <button className="tap" onClick={doLeave}
                style={{width:"100%",background:"transparent",
                  border:"1px solid rgba(255,60,80,.25)",borderRadius:13,
                  padding:"12px",color:"#ff5c5c",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                {b.owner_device===deviceId?"Cancelar reserva":"Salirme del partido"}
              </button>
            )}
          </Sheet>
        );
      })()}

      {toast&&(
        <div style={{position:"absolute",top:14,right:14,zIndex:200,
          background:toast.kind==="err"?"rgba(220,50,70,.95)":toast.kind==="info"?"rgba(30,40,60,.98)":"rgba(20,80,160,.95)",
          borderRadius:13,padding:"10px 15px",fontSize:12,fontWeight:600,color:"#fff",
          boxShadow:"0 8px 28px rgba(0,0,0,.5)",animation:"toastIn .3s ease",maxWidth:220}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
